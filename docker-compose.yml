# Local Postgres for spoor's database-backed evaluate + categorise stages.
#
# Runs on host port 5433 (not the default 5432) and a distinct named volume, so it
# never collides with the house Postgres on 5432. The named volume persists across
# `docker compose down` (use `down -v` to wipe).
#
#   docker compose up -d      # start
#   docker compose down       # stop, KEEP data
#   docker compose down -v    # stop + WIPE data
#
# Connection:  postgresql+psycopg2://postgres:postgres@localhost:5433/spoor
# (this is the DATABASE_URL default in spoor/db/connection.py)

services:
  postgres:
    image: postgres:17
    container_name: spoor_postgres
    environment:
      POSTGRES_DB: spoor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - spoor_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d spoor"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  spoor_pgdata:
    name: spoor_pgdata
